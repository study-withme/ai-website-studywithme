# MySQL 없이 로컬 스모크용 (예: gradlew bootRun --args='--spring.profiles.active=devh2')
spring.datasource.url=jdbc:h2:mem:studywithme;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.h2.console.enabled=true
spring.thymeleaf.cache=false
server.port=8080
python.auto-init.enabled=false
gemini.api.key=dummy
